<body data-page="contact">

  <div id="site-header"></div>

  <main>
    <section class="page-hero">

        <h1 class="page-hero__title" data-i18n="contact.title">Contact Us</h1>

      <div class="container">

              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 0 1-2.555-.337A5.972 5.972 0 0 1 5.41 20.97a5.969 5.969 0 0 1-.474-.065 4.48 4.48 0 0 0 .978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25Z"/></svg>
            </div>
            <p class="contact-info__label" data-i18n="footer.whatsapp">WhatsApp</p>
            <p class="contact-info__value"><a href="https://wa.me/996706001517">+996 706 001 517</a></p>
          </div>
          <div class="contact-info__item">
            <div class="contact-info__icon">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5"/></svg>
            </div>
            <p class="contact-info__label" data-i18n="footer.telegram">Telegram</p>
            <p class="contact-info__value"><a href="https://t.me/iamnomad_kg">@iamnomad_kg</a></p>
          </div>
          <div class="contact-info__item">
            <div class="contact-info__icon">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/></svg>
            </div>
            <p class="contact-info__label" data-i18n="footer.email">Email</p>
            <p class="contact-info__value"><a href="mailto:Iamnomadkgz@gmail.com">Iamnomadkgz@gmail.com</a></p>
          </div>
          <div class="contact-info__item">
            <div class="contact-info__icon">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 0 1-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 6v.75Z"/></svg>
            </div>
            <p class="contact-info__label" data-i18n="footer.phone">Phone</p>
            <p class="contact-info__value"><a href="tel:+996706001517">+996 706 001 517</a></p>
          </div>
        </div>

        <div class="two-col">
          <div>
            <h2 class="section__title mb-24" data-i18n="contact.form.title">Send a Message</h2>
            <p class="text-muted mb-24" data-i18n="contact.form.subtitle">[Contact form placeholder]</p>
            <form data-form>
              <input type="hidden" name="access_key" value="YOUR_WEB3FORMS_ACCESS_KEY">
              <input type="hidden" name="subject" value="Contact form — I AM NOMAD">
              <div class="form__group">
                <label class="form__label" for="contact-name" data-i18n="form.name">Your Name</label>
                <input class="form__input" type="text" id="contact-name" name="name" data-i18n-placeholder="form.name" placeholder="Your Name" required>
              </div>
              <div class="form__group">
                <label class="form__label" for="contact-email" data-i18n="form.email">Email Address</label>
                <input class="form__input" type="email" id="contact-email" name="email" data-i18n-placeholder="form.email" placeholder="Email Address" required>
              </div>
              <div class="form__group">
                <label class="form__label" for="contact-tour" data-i18n="form.tour">Tour</label>
                <input class="form__input" type="text" id="contact-tour" name="subject" data-i18n-placeholder="form.tour" placeholder="Tour">
              </div>
              <div class="form__group">
                <label class="form__label" for="contact-message" data-i18n="form.message">Your Message</label>
                <textarea class="form__textarea" id="contact-message" name="message" data-i18n-placeholder="form.message" placeholder="Your Message"></textarea>
              </div>
              <button type="submit" class="btn btn--primary" data-i18n="btn.send">Send</button>
            </form>

            <div class="mt-48">
              <h3 class="mb-24" data-i18n="contact.social.title">Social Media</h3>
              <div class="social-links">
                <a href="https://www.instagram.com/iamnomad_kg/" class="social-links__item" aria-label="Instagram" target="_blank" rel="noopener">IG</a>
                <a href="https://www.facebook.com/iamnomadkg/" class="social-links__item" aria-label="Facebook" target="_blank" rel="noopener">FB</a>
                <a href="https://www.youtube.com/@iamnomad_kg" class="social-links__item" aria-label="YouTube" target="_blank" rel="noopener">YT</a>
              </div>
            </div>
          </div>

          <div>
            <iframe
              src="https://maps.google.com/maps?q=Bishkek+Kyrgyzstan&output=embed"
              class="map-iframe"
              width="100%"
              height="400"
              style="border:0;border-radius:var(--radius);"
              allowfullscreen
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              title="Office location"></iframe>
          </div>
        </div>
      </div>
    </section>
