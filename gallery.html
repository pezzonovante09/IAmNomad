<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <script src="js/theme-init.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — I AM NOMAD</title>
  <meta name="description" content="Photos and videos from I AM NOMAD tours across Kyrgyzstan.">
  <meta property="og:title" content="Gallery — I AM NOMAD">
  <meta property="og:description" content="Photos and videos from I AM NOMAD tours across Kyrgyzstan.">
  <meta property="og:image" content="https://images.unsplash.com/photo-1760630149964-200517d8d437?w=1200&q=80&auto=format&fit=crop">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body data-page="gallery">

  <div id="site-header"></div>

  <main>
    <section class="page-hero">
      <div class="container">
        <h1 class="page-hero__title" data-i18n="gallery.title">Gallery</h1>
        <p class="page-hero__subtitle" data-i18n="gallery.subtitle">Photos and videos from our tours</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="tabs">
          <div class="tabs__list">
            <button class="tabs__btn tabs__btn--active" data-tab="photo" data-i18n="gallery.tab.photo">Photo</button>
            <button class="tabs__btn" data-tab="video" data-i18n="gallery.tab.video">Video</button>
          </div>

          <div class="tabs__panel tabs__panel--active" data-tab="photo">
            <div class="gallery-grid">
              <img src="https://images.unsplash.com/photo-1689788648053-cd482d1acd9c?w=600&q=65&auto=format&fit=crop" alt="Issyk-Kul lake" width="600" height="600" loading="lazy">
              <img src="https://images.unsplash.com/photo-1758016860798-0b96354664b9?w=600&q=65&auto=format&fit=crop" alt="Yurts at Tash Rabat" width="600" height="600" loading="lazy">
              <img src="https://images.unsplash.com/photo-1761873177867-499c27dc4cd7?w=600&q=65&auto=format&fit=crop" alt="Horse trekking" width="600" height="600" loading="lazy">
              <img src="https://images.unsplash.com/photo-1760630149964-200517d8d437?w=600&q=65&auto=format&fit=crop" alt="Song-Kul pasture" width="600" height="600" loading="lazy">
              <img src="https://images.unsplash.com/photo-1761872936161-9c2075a7ca11?w=600&q=65&auto=format&fit=crop" alt="Eagle hunting" width="600" height="600" loading="lazy">
              <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&q=65&auto=format&fit=crop" alt="Mountain peaks" width="600" height="600" loading="lazy">
              <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=600&q=65&auto=format&fit=crop" alt="Alpine trekking" width="600" height="600" loading="lazy">
              <img src="https://images.unsplash.com/photo-1519834785169-98be25ec3f84?w=600&q=65&auto=format&fit=crop" alt="Winter mountains" width="600" height="600" loading="lazy">
              <img src="https://images.unsplash.com/photo-1551632811-561732d1e306?w=600&q=65&auto=format&fit=crop" alt="Group hiking" width="600" height="600" loading="lazy">
              <img src="https://images.unsplash.com/photo-1689788648053-cd482d1acd9c?w=600&q=65&auto=format&fit=crop&crop=entropy" alt="Lake panorama" width="600" height="600" loading="lazy">
              <img src="https://images.unsplash.com/photo-1758016860798-0b96354664b9?w=600&q=65&auto=format&fit=crop&crop=top" alt="Nomad camp" width="600" height="600" loading="lazy">
              <img src="https://images.unsplash.com/photo-1760630149964-200517d8d437?w=600&q=65&auto=format&fit=crop&crop=bottom" alt="Highland valley" width="600" height="600" loading="lazy">
            </div>
          </div>

          <div class="tabs__panel" data-tab="video">
            <div class="grid grid--2">
              <div class="placeholder placeholder--video" role="img" aria-label="Gallery video 1"><svg class="placeholder__play" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg></div>
              <div class="placeholder placeholder--video" role="img" aria-label="Gallery video 2"><svg class="placeholder__play" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg></div>
              <div class="placeholder placeholder--video" role="img" aria-label="Gallery video 3"><svg class="placeholder__play" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg></div>
              <div class="placeholder placeholder--video" role="img" aria-label="Gallery video 4"><svg class="placeholder__play" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="js/translations.js?v=3"></script>
  <script src="js/script.js?v=3"></script>
</body>
</html>
